# 主题配置（新增navigation.expand启用折叠导航）
theme:
  # custom_dir: material/overrides # 自定义文件夹，按需启用
  name: material # 主题名称
  # logo: static/images/logo.png # logo 图片，按需启用
  favicon: img/favicon.ico
  language: zh # 语言
  font: # 字体
    text: Roboto
    code: Roboto Mono
  palette:
  - media: "(prefers-color-scheme: light)" # 浅色模式
    scheme: default
    primary: light green
    accent: orange
    toggle:
      icon: material/lightbulb-variant
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)" # 深色模式
    scheme: slate
    primary: blue grey
    accent: amber
    toggle:
      icon: material/lightbulb-variant-outline
      name: Switch to light mode
  icon: # 图标配置
    logo: logo
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right
    repo: fontawesome/brands/git-alt 
  # 功能（核心：启用navigation.expand）
  features:
    # - header.autohide # 自动隐藏头部，按需启用
    - navigation.instant # 导航栏快速跳转
    - navigation.tabs # 导航栏多标签
    - navigation.sections # 导航栏分组
    - navigation.tracking # 导航栏URL跟踪
    - navigation.footer # 底部导航栏
    - search.highlight # 搜索结果高亮
    - navigation.expand # 启用导航栏折叠（关键配置）
    - navigation.indexes # 提供概述页面
    - toc.follow # 目录跟随
    - navigation.top # 快速回到顶部
    - search.suggest # 搜索建议
    - search.share # 搜索结果分享
    - content.code.copy # 复制代码按钮
    - navigation.instant.prefetch # 预加载
    - navigation.instant.progress # 进度条

# 插件配置
plugins:
- search # 搜索插件
- tags # 标签功能插件

# markdown扩展配置
markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 4
      title: On this page
  - abbr
  - tables
  - def_list
  - attr_list
  - md_in_html
  - sane_lists
  - admonition
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.magiclink
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - markdown.extensions.attr_list
  - pymdownx.smartsymbols
  - pymdownx.arithmatex
  - pymdownx.caret
  - footnotes

