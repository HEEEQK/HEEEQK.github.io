# 主题配置（补充折叠相关特性）
theme:
  name: material
  favicon: img/favicon.ico
  language: zh
  font:
    text: Roboto
    code: Roboto Mono
  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: light green
    accent: orange
    toggle:
      icon: material/lightbulb-variant
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: blue grey
    accent: amber
    toggle:
      icon: material/lightbulb-variant-outline
      name: Switch to light mode
  icon:
    logo: logo
    previous: fontawesome/solid/angle-left
    next: fontawesome/solid/angle-right
    repo: fontawesome/brands/git-alt
  features:
    - navigation.instant
    - navigation.tabs                # 顶部标签页
    - navigation.sections            # 侧边栏按章节分组（折叠核心）
    - navigation.expand              # 新增：点击父节点展开子项
    - navigation.tracking
    - navigation.footer
    - search.highlight
    - navigation.indexes             # 为折叠节点生成索引页
    - toc.follow
    - navigation.top
    - search.suggest
    - search.share
    - content.code.copy
    - navigation.instant.prefetch
    - navigation.instant.progress

# 插件配置
plugins:
- search
- tags

# markdown扩展配置
markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 4
      title: On this page
  - abbr
  - tables
  - def_list
  - attr_list
  - md_in_html
  - sane_lists
  - admonition
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.magiclink
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - markdown.extensions.attr_list
  - pymdownx.smartsymbols
  - pymdownx.arithmatex
  - pymdownx.caret
  - footnotes

